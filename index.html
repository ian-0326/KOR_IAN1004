<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOR.IAN | 韓國連線清單</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #28b0eb; --pink: #ff85a2; --bg: #f2f4f6; --white: #ffffff; --text: #191f28; --sub: #4e5968; --gray: #adb5bd; --error: #f44336; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); -webkit-font-smoothing: antialiased; touch-action: manipulation; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        /* 修正：強制登入隔離牆與載入樣式 */
        #login-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-loader { width: 40px; height: 40px; border: 4px solid #e5e8eb; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fixed-header { position: sticky; top: 0; background: var(--bg); z-index: 110; padding: 20px 16px 10px 16px; display: flex; justify-content: space-between; align-items: center; }
        .page-logo { height: 45px; width: auto; object-fit: contain; }
        .add-btn { width: 44px; height: 44px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: none; box-shadow: 0 4px 12px rgba(40, 176, 235, 0.2); cursor: pointer; }

        .page-content { display: none; padding: 0 16px 280px 16px; min-height: 100vh; box-sizing: border-box; }
        .page-content.active { display: block; }
        
        .category-wrapper { position: sticky; top: 75px; background: var(--bg); margin: 0 -16px 20px -16px; padding: 10px 16px; overflow-x: auto; display: flex; gap: 8px; scrollbar-width: none; z-index: 90; }
        .cat-pill { white-space: nowrap; padding: 10px 20px; background: #fff; border-radius: 50px; font-size: 14px; font-weight: 700; color: var(--sub); box-shadow: 0 2px 6px rgba(0,0,0,0.05); flex-shrink: 0; }
        .cat-pill.active { background: var(--primary); color: #fff; }

        .item-card { background: #fff; padding: 20px; border-radius: 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 12px; }
        .item-main { flex: 1; cursor: pointer; }
        .item-name { font-size: 16px; font-weight: 700; color: var(--text); display: inline-block; margin-bottom: 4px; }
        .item-option { font-size: 12px; color: var(--gray); margin-left: 6px; font-weight: 400; }
        .item-price { color: var(--primary); font-weight: 900; font-size: 17px; display: block; }

        .qty-ctrl { display: flex; align-items: center; gap: 14px; background: #f8f9fa; padding: 8px 16px; border-radius: 50px; }
        .qty-btn { background: none; border: none; padding: 0; color: var(--sub); display: flex; align-items: center; cursor: pointer; }
        .qty-num { font-size: 16px; font-weight: 900; color: var(--primary); min-width: 20px; text-align: center; }

        .card-box { background: #fff; border-radius: 32px; padding: 15px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: #fff; border-radius: 36px; padding: 24px 20px 28px 20px; width: 100%; max-width: 360px; max-height: 85vh; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
        .modal-body { overflow-y: auto; flex-grow: 1; width: 100%; padding-top: 10px; }
        .form-item { margin-bottom: 12px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .form-label { width: calc(100% - 24px); font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--sub); display: flex; align-items: center; }
        .req-tag { color: var(--error); font-size: 12px; margin-left: 6px; display: none; }
        .input-box { width: calc(100% - 24px); padding: 12px 20px; border: none; border-radius: 18px; font-size: 15px; outline: none; background: #f2f4f6; box-sizing: border-box; transition: 0.2s; -webkit-appearance: none; }
        .input-box.error { background: #fff5f5; box-shadow: 0 0 0 2px var(--error); }
        
        .row-flex { display: flex; width: calc(100% - 24px); gap: 10px; align-items: flex-end; }
        .gender-group { display: flex; gap: 8px; margin-bottom: 3px; }
        .gender-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #f2f4f6; color: var(--gray); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: 900; }
        .gender-btn.active-m { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(40, 176, 235, 0.3); }
        .gender-btn.active-f { background: var(--pink); color: white; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }

        .birth-row { display: flex; width: calc(100% - 24px); gap: 8px; justify-content: center; position: relative; }
        .birth-row select { width: 33.33% !important; padding: 12px 10px; text-align: center; cursor: pointer; }

        .btn-main { background: var(--primary); color: #fff; border: none; padding: 12px 40px; width: auto; min-width: 140px; border-radius: 50px; font-weight: 700; font-size: 15px; cursor: pointer; margin: 0 auto; display: block; }
        .btn-main:disabled { background: var(--gray); opacity: 0.7; }

        .modal-footer { flex-shrink: 0; display: flex; justify-content: center; width: 100%; padding-top: 10px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid #e5e8eb; z-index: 200; }
        .nav-item { color: #adb5bd; text-align: center; flex: 1; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="login-gate">
        <img src="https://raw.githubusercontent.com/ian-0326/KOR_IAN1004/main/KORIAN.png" alt="Logo" style="height:55px; width:auto;">
        <div class="gate-loader"></div>
    </div>

    <div id="main-app" style="display: none;">
        <section id="page-shop" class="page-content">
            <div class="fixed-header">
                <img src="https://raw.githubusercontent.com/ian-0326/KOR_IAN1004/main/KORIAN.png" alt="Logo" class="page-logo">
                <button class="add-btn" onclick="openAddModal()"><i data-feather="plus"></i></button>
            </div>
            <div class="category-wrapper" id="category-bar">
                <div class="cat-pill active" onclick="filterCategory('全部', this)">全部</div>
                <div class="cat-pill" onclick="filterCategory('化妝水', this)">化妝水</div>
                <div class="cat-pill" onclick="filterCategory('精華液', this)">精華液</div>
                <div class="cat-pill" onclick="filterCategory('乳液', this)">乳液</div>
                <div class="cat-pill" onclick="filterCategory('面膜棉片', this)">面膜棉片</div>
                <div class="cat-pill" onclick="filterCategory('洗臉洗澡', this)">洗臉洗澡</div>
                <div class="cat-pill" onclick="filterCategory('美髮護髮', this)">美髮護髮</div>
                <div class="cat-pill" onclick="filterCategory('彩妝遮瑕', this)">彩妝遮瑕</div>
                <div class="cat-pill" onclick="filterCategory('口腔護理', this)">口腔護理</div>
                <div class="cat-pill" onclick="filterCategory('防曬', this)">防曬</div>
                <div class="cat-pill" onclick="filterCategory('藥膏藥品', this)">藥膏藥品</div>
                <div class="cat-pill" onclick="filterCategory('食品（含保健）', this)">食品（含保健）</div>
                <div class="cat-pill" onclick="filterCategory('其他', this)">其他</div>
            </div>
            <div id="item-list"></div>
        </section>

        <section id="page-passport" class="page-content">
            <div class="fixed-header"><img src="https://raw.githubusercontent.com/ian-0326/KOR_IAN1004/main/KORIAN.png" alt="Logo" class="page-logo"></div>
            <div class="card-box" style="text-align: center; margin-top: 20px;">
                <h3 style="font-weight: 900;">我的護照</h3>
                <div id="user-display-name" style="font-size: 20px; font-weight: 900; color: var(--primary); margin: 10px 0;">---</div>
                <div id="user-phone" style="color: var(--gray); font-size: 14px;">---</div>
                <button class="btn-main" style="background:#f2f4f6; color:#adb5bd; margin-top:30px; box-shadow:none; width:auto; min-width:120px;" onclick="liff.logout(); location.reload();">登出帳號</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item" id="nav-shop" onclick="switchPage('shop')"><i data-feather="shopping-bag"></i><span>弘大漫遊</span></div>
            <div class="nav-item" id="nav-passport" onclick="switchPage('passport')"><i data-feather="user"></i><span>我的護照</span></div>
        </nav>
    </div>

    <div id="register-modal" class="modal">
        <div class="modal-card">
            <div style="text-align: center; margin-bottom: 20px;"><h2 style="font-weight:900; margin:0; font-size: 20px;">報到櫃檯</h2></div>
            <div class="modal-body">
                <div class="form-item">
                    <div class="row-flex">
                        <div style="flex:1;"><label class="form-label">真實姓名<span class="req-tag" id="tag-reg-name">*必填</span></label><input type="text" id="reg-name" class="input-box" style="width:100%;" placeholder="您的姓名" oninput="clearError(this)"></div>
                        <div style="width:auto; text-align:center;"><label class="form-label">性別</label><div class="gender-group"><button class="gender-btn" id="g-male" onclick="setGender('M')">男</button><button class="gender-btn" id="g-female" onclick="setGender('F')">女</button></div></div>
                    </div>
                </div>
                <div class="form-item"><label class="form-label">聯絡電話<span class="req-tag" id="tag-reg-tel">*必填</span></label><input type="tel" id="reg-tel" class="input-box" placeholder="09xxxxxxxx" maxlength="10" oninput="clearError(this)"></div>
                <div class="form-item"><label class="form-label">出生日期<span class="req-tag" id="tag-reg-birth">*必填</span></label><div class="birth-row"><select id="reg-birth-y" class="input-box" onchange="clearError(this)"></select><select id="reg-birth-m" class="input-box" onchange="clearError(this)"></select><select id="reg-birth-d" class="input-box" onchange="clearError(this)"></select></div></div>
                <div class="form-item"><label class="form-label">電子信箱</label><input type="email" id="reg-email" class="input-box" placeholder="example@mail.com"></div>
            </div>
            <div class="modal-footer"><button class="btn-main" id="btn-register" onclick="handleRegister()">登機報到</button></div>
        </div>
    </div>

    <script>
        const LIFF_ID = '2009405888-D5absVA3';
        const SUPABASE_URL = 'https://ivpctyqlrkjstfsoweeh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cGN0eXFscmtqc3Rmc293ZWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTk1MTksImV4cCI6MjA4ODc3NTUxOX0.DYgzhaTH3_5NFwv009ZfZAshfUnCW2PeTuNcJ9feyMU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userLineId = "", userData = null, selectedGender = "", allProducts = [], cart = {};

        // 修正：嚴格的線性同步初始化流程
        async function init() {
            try {
                // 1. 優先處理 LINE 登入牆
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                const profile = await liff.getProfile();
                userLineId = profile.userId;

                // 2. 登入成功後，立刻在背景把商品抓取並渲染好
                await fetchProducts();

                // 3. 去資料庫比對會員身分
                const { data } = await _supabase.from('profiles').select('*').or(`line_id.eq.${userLineId},user_id.eq.${userLineId}`);
                
                // 4. 所有資料都完全到位了，解鎖畫面放行
                document.getElementById('main-app').style.display = 'block'; // 亮出網頁主體
                document.getElementById('login-gate').style.display = 'none'; // 關閉白色加載牆

                if (data && data.length > 0) {
                    userData = data[0]; 
                    renderUserProfile(); 
                    switchPage('passport'); // 舊會員直接看護照
                } else {
                    initBirthSelects();
                    document.body.classList.add('modal-open');
                    document.getElementById('register-modal').style.display = 'flex'; // 新會員彈出櫃檯
                }
                feather.replace();
            } catch (e) { console.error(e); }
        }

        async function fetchProducts() {
            const { data } = await _supabase.from('products').select('*').eq('is_active', true);
            if(data) {
                allProducts = data.sort((a,b)=>(b.order_count||0)-(a.order_count||0));
                renderProducts(allProducts);
            }
        }

        function renderProducts(ps) {
            const container = document.getElementById('item-list');
            if(!container) return;
            container.innerHTML = ps.map(p => `
                <div class="item-card">
                    <div class="item-main" onclick="window.open('${p.olive_url}','_blank')">
                        <div><span class="item-name">${p.name_zh}</span>${p.option ? `<span class="item-option">${p.option}</span>`:''}</div>
                        <span class="item-price">NT$ ${Number(p.price_nt).toLocaleString()}</span>
                    </div>
                    <div class="qty-ctrl">
                        <button class="qty-btn" onclick="updateQty('${p.id}',-1)"><i data-feather="minus" style="width:18px;"></i></button>
                        <span class="qty-num" id="qty-${p.id}">${cart[p.id]?cart[p.id].qty:0}</span>
                        <button class="qty-btn" onclick="updateQty('${p.id}',1)"><i data-feather="plus" style="width:18px;"></i></button>
                    </div>
                </div>
            `).join('');
            feather.replace();
        }

        function initBirthSelects() {
            const sy = document.getElementById('reg-birth-y'), sm = document.getElementById('reg-birth-m'), sd = document.getElementById('reg-birth-d');
            sy.innerHTML = '<option value="">年</option>' + Array.from({length: 87}, (_, i) => `<option value="${1940+i}">${1940+i}</option>`).reverse().join('');
            sm.innerHTML = '<option value="">月</option>' + Array.from({length: 12}, (_, i) => `<option value="${(i+1).toString().padStart(2,'0')}">${(i+1).toString().padStart(2,'0')}</option>`).join('');
            sd.innerHTML = '<option value="">日</option>' + Array.from({length: 31}, (_, i) => `<option value="${(i+1).toString().padStart(2,'0')}">${(i+1).toString().padStart(2,'0')}</option>`).join('');
        }

        function setGender(g) {
            selectedGender = g;
            const maleBtn = document.getElementById('g-male'), femaleBtn = document.getElementById('g-female');
            maleBtn.classList.remove('active-m'); femaleBtn.classList.remove('active-f');
            if (g === 'M') maleBtn.classList.add('active-m');
            if (g === 'F') femaleBtn.classList.add('active-f');
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-register');
            const name = document.getElementById('reg-name'), tel = document.getElementById('reg-tel'), email = document.getElementById('reg-email');
            const by = document.getElementById('reg-birth-y'), bm = document.getElementById('reg-birth-m'), bd = document.getElementById('reg-birth-d');
            if(!name.value.trim() || !/^09\d{8}$/.test(tel.value) || !by.value || !bm.value || !bd.value){ alert("請檢查必填欄位"); return; }
            if(!userLineId) { alert("尚未取得 LINE 資訊"); return; }
            btn.disabled = true; btn.innerText = "處理中...";
            const fullBirth = `${by.value}-${bm.value}-${bd.value}`;
            const { error } = await _supabase.from('profiles').insert([{ line_id: userLineId, user_id: userLineId, full_name: name.value.trim(), phone: tel.value.trim(), birthday: fullBirth, gender: selectedGender, email: email.value.trim() }]);
            if(!error) location.reload(); else { alert("失敗：" + error.message); btn.disabled = false; }
        }

        function renderUserProfile() {
            document.getElementById('user-display-name').innerText = userData.full_name;
            document.getElementById('user-phone').innerText = userData.phone;
        }

        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(e=>e.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
            if(p === 'shop') renderProducts(allProducts);
            feather.replace();
        }

        function updateQty(id, d) {
            const p = allProducts.find(x=>x.id===id);
            if(!cart[id]) cart[id]={id:p.id, name:p.name_zh, option:p.option, price:p.price_nt, qty:0};
            cart[id].qty=Math.max(0, cart[id].qty+d);
            if(document.getElementById(`qty-${id}`)) document.getElementById(`qty-${id}`).innerText=cart[id].qty;
        }

        function clearError(el) { el.classList.remove('error'); }
        window.onload = init;
    </script>
</body>
</html>
