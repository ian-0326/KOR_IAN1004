<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑盒子維修中心 - 官方網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-black: #1a1a1a;
            --secondary-black: #2d2d2d;
            --gold-accent: #d4af37;
            --bg-light: #f9f9f9;
            --text-dark: #333333;
            --text-muted: #999999;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }

        /* --- 導覽列 --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            background-color: #ffffff; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { font-size: 24px; color: var(--primary-black); cursor: pointer; background: none; border: none; }
        .logo-img { height: 54px; width: auto; object-fit: contain; display: block; }

        .header-right { display: flex; gap: 15px; }
        .nav-btn {
            display: flex; justify-content: center; align-items: center;
            width: 42px; height: 42px; border-radius: 50%;
            background-color: var(--primary-black); color: #ffffff;
            text-decoration: none; font-size: 18px; transition: var(--transition);
        }
        .nav-btn:hover { background-color: var(--gold-accent); transform: translateY(-2px); }

        /* --- 側邊選單 (寬度 220px，Logo靠左) --- */
        .sidebar {
            position: fixed; top: 0; left: -220px; width: 220px; height: 100%;
            background-color: #ffffff; z-index: 2000; transition: var(--transition);
            padding: 24px; box-shadow: 5px 0 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        
        .sidebar-header { 
            display: flex; 
            justify-content: flex-start; 
            padding-left: 8px; 
            padding-bottom: 20px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #f0f0f0; 
        }
        .sidebar-logo { height: 50px; width: auto; object-fit: contain; display: block; }

        .sidebar-content { display: flex; flex-direction: column; gap: 24px; }
        .menu-group { display: flex; flex-direction: column; gap: 8px; }
        .group-title { font-size: 13px; color: var(--text-muted); letter-spacing: 1px; padding-left: 8px; }
        .menu-item { color: var(--text-dark); text-decoration: none; font-size: 16px; padding: 8px; border-radius: 6px; transition: var(--transition); cursor: pointer; }
        .menu-item:hover { color: var(--gold-accent); background-color: #fcfbf7; padding-left: 14px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.3); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        /* --- 頁面內容切換核心 --- */
        main { 
            margin-top: 85px; 
            padding: 5px 20px 40px 20px; 
            max-width: 1200px; 
            margin-left: auto; 
            margin-right: auto; 
            min-height: calc(100vh - 185px); 
        }
        
        .content-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 共用容器樣式 --- */
        .page-container { 
            background: transparent; 
            padding: 15px 0 20px 0; 
            text-align: center; 
        }

        .page-header { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 6px; 
            text-align: center; 
            color: var(--primary-black); 
        }

        /* 服務流程按鈕排版 */
        .process-tabs { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 20px; 
            flex-wrap: nowrap; 
        }
        
        .tab-btn { 
            background: var(--primary-black); 
            color: #fff; 
            border: 2px solid var(--primary-black); 
            padding: 6px 14px; 
            font-size: 18px; 
            border-radius: 40px; 
            cursor: pointer; 
            transition: var(--transition); 
            letter-spacing: 1px;
            white-space: nowrap; 
        }
        .tab-btn.active { border-color: var(--gold-accent); color: var(--gold-accent); font-weight: 700; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15); }
        .tab-btn:hover { transform: translateY(-2px); background-color: var(--secondary-black); }

        /* 圖片外框維持 600px */
        .img-box { max-width: 600px; margin: 0 auto; }
        .display-img { width: 100%; height: auto; display: none; }
        .display-img.active { display: block; animation: fadeIn 0.4s; }

        /* --- 📱 價格查詢 左右滑動手勢選單樣式區 --- */
        .price-slider-outer {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 25px auto 10px auto;
            overflow: hidden;
        }

        .price-slider-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px;
            padding: 15px calc(50% - 35px); 
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .price-slider-container::-webkit-scrollbar { display: none; }

        .price-slider-item {
            scroll-snap-align: center;
            flex: 0 0 70px; width: 70px; height: 70px;
            border-radius: 50%; background-color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; border: 2px solid #e0e0e0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, border-color 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
            opacity: 0.35; transform: scale(0.85);
        }

        .price-slider-item img { width: 75%; height: 75%; object-fit: contain; }
        .price-slider-item.active {
            opacity: 1; transform: scale(1.15);
            border-color: var(--gold-accent);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.25);
            background-color: #ffffff;
        }

        .price-selected-title {
            font-size: 20px; font-weight: 700; color: var(--primary-black);
            margin: 10px 0 25px 0; min-height: 30px; letter-spacing: 1px;
        }

        /* --- 🛂 🛠 「我的護照」全版背景與底部沉浸定位樣式區 --- */
        .passport-page-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 720px; /* 給予足夠高度完美呈現 3D 公仔背景 */
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            /* 修改：設置您指定的圖片為該頁面背景 */
            background-image: url('KIbackground.png');
            background-size: cover;
            background-position: center;
        }

        /* 修改：將整個資料卡與按鈕群組精確定位於頁面最下方位置 */
        .passport-bottom-group {
            position: absolute;
            bottom: 25px;
            left: 5%;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
        }

        /* 護照資料卡片 */
        .passport-info-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 14px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .passport-info-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-black);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .passport-info-desc {
            font-size: 13px;
            color: #555555;
        }

        /* 修改：下單流程與我的訂單長方形選單按鈕 */
        .passport-rect-btn {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            height: 48px; /* 修改：降低高度變成長方形選單 */
            padding: 0 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between; /* 修改：icon靠左、選單名稱靠右顯示 */
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .passport-rect-btn:hover {
            background: #ffffff;
            border-color: var(--gold-accent);
            transform: translateY(-2px);
        }

        .passport-rect-btn i {
            font-size: 18px;
            color: var(--primary-black); /* icon靠左 */
        }

        .passport-rect-btn .btn-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark); /* 選單名稱靠右 */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="openMenu"><i class="fa-solid fa-bars"></i></button>
            <div class="logo-container"><img src="site logo.png" alt="Logo" class="logo-img"></div>
        </div>
        <div class="header-right">
            <a href="https://blackboxrepair.github.io/membership/" class="nav-btn"><i class="fa-solid fa-user"></i></a>
            <a href="https://blackboxrepair.github.io/bookingonline/" class="nav-btn"><i class="fa-solid fa-calendar-check"></i></a>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="site logo.png" class="sidebar-logo">
        </div>
        <div class="sidebar-content">
            <div class="menu-group">
                <div class="menu-item" onclick="navigateTo('home')">首頁</div>
                <div class="menu-item" onclick="navigateTo('passport')">我的護照</div>
            </div>
            <div class="menu-group">
                <div class="group-title">服務項目</div>
                <div class="menu-item" onclick="navigateTo('process')">服務流程</div>
                <div class="menu-item" onclick="navigateTo('prices')">價格查詢</div>
            </div>
            <div class="menu-group">
                <div class="group-title">實作紀錄</div>
                <div class="menu-item" onclick="navigateTo('cases')">維修案例</div>
            </div>
            <div class="menu-group">
                <div class="group-title">門市資訊</div>
                <div class="menu-item" onclick="navigateTo('locations')">服務站點</div>
            </div>
        </div>
    </nav>

    <main>
        <section id="section-home" class="content-section">
            <div class="empty-state">
                <h2 class="page-header">歡迎來到黑盒子維修中心</h2>
                <p>請從左側選單選擇您需要的服務</p>
            </div>
        </section>

        <section id="section-passport" class="content-section">
            <div class="passport-page-container">
                
                <div class="passport-bottom-group">
                    
                    <div class="passport-info-card">
                        <div class="passport-info-title">護照資料</div>
                        <div class="passport-info-desc">盒芯專屬黑盒子數位維修權益護照</div>
                    </div>

                    <div class="passport-rect-btn">
                        <i class="fa-solid fa-route"></i>
                        <span class="btn-label">下單流程</span>
                    </div>

                    <div class="passport-rect-btn">
                        <i class="fa-solid fa-receipt"></i>
                        <span class="btn-label">我的訂單</span>
                    </div>
                    
                </div>
            </div>
        </section>

        <section id="section-process" class="content-section">
            <div class="page-container">
                <h2 class="page-header">服務流程</h2>
                <div class="process-tabs">
                    <button class="tab-btn active" onclick="changeProcessImg('phone', this)">手機維修</button>
                    <button class="tab-btn" onclick="changeProcessImg('notebook', this)">筆電維修</button>
                    <button class="tab-btn" onclick="changeProcessImg('data', this)">資料救援</button>
                </div>
                <div class="img-box">
                    <img src="phone process.png" id="img-process-phone" class="display-img active">
                    <img src="notebook process.png" id="img-process-notebook" class="display-img">
                    <img src="data process.png" id="img-process-data" class="display-img">
                </div>
            </div>
        </section>

        <section id="section-prices" class="content-section">
            <div class="page-container">
                <h2 class="page-header">價格查詢</h2>
                
                <div class="price-slider-outer">
                    <div class="price-slider-container" id="priceSlider">
                        <div class="price-slider-item" data-type="na">
                            <img src="price_icon_na.png">
                        </div>
                        <div class="price-slider-item" data-type="applewatch">
                            <img src="price_icon_apple watch.png">
                        </div>
                        <div class="price-slider-item" data-type="capacity">
                            <img src="price_icon_capacity.png">
                        </div>
                        <div class="price-slider-item" data-type="switch">
                            <img src="price_icon_switch.png">
                        </div>
                        <div class="price-slider-item" data-type="vacuum">
                            <img src="price_icon_vacuum cleaner.png">
                        </div>
                        <div class="price-slider-item" data-type="hairdryer">
                            <img src="price_icon_hair dryer.png">
                        </div>
                        <div class="price-slider-item" data-type="data">
                            <img src="price_icon_data.png">
                        </div>
                    </div>
                </div>

                <div class="price-selected-title" id="priceSelectedTitle"></div>

                <div class="img-box">
                    <img src="Price_applewatch.PNG" id="img-price-applewatch" class="display-img">
                    <img src="Price_memory.PNG" id="img-price-memory" class="display-img">
                    <img src="" id="img-price-switch" class="display-img">
                    <img src="" id="img-price-vacuum" class="display-img">
                    <img src="" id="img-price-hairdryer" class="display-img">
                    <img src="" id="img-price-data" class="display-img">
                </div>
            </div>
        </section>

        <section id="section-cases" class="content-section">
            <h2 class="page-header">維修案例</h2>
            <div class="empty-state">維修案例文章準備中...</div>
        </section>

        <section id="section-locations" class="content-section">
            <h2 class="page-header">服務站點</h2>
            <div class="empty-state">門市據點載入中...</div>
        </section>
    </main>

    <footer>&copy; 2026 BLACK BOX 維修中心. All Rights Reserved.</footer>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        document.getElementById('openMenu').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

        function navigateTo(sectionId) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            const targetSection = document.getElementById(`section-${sectionId}`);
            if (targetSection) {
                targetSection.classList.add('active');
                window.location.hash = sectionId;
            }
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            window.scrollTo(0, 0);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const currentHash = window.location.hash.replace('#', '');
            if (currentHash && document.getElementById(`section-${currentHash}`)) {
                navigateTo(currentHash);
            } else {
                navigateTo('home');
            }
            updateActiveSliderItem();
        });

        function changeProcessImg(type, btn) {
            document.querySelectorAll('#section-process .tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#section-process .display-img').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`img-process-${type}`).classList.add('active');
        }

        // 價格查詢：手勢滑動置中偵測
        const priceSlider = document.getElementById('priceSlider');
        const priceSelectedTitle = document.getElementById('priceSelectedTitle');
        const sliderItems = document.querySelectorAll('.price-slider-item');

        function updateActiveSliderItem() {
            const containerRect = priceSlider.getBoundingClientRect();
            const containerCenter = containerRect.left + containerRect.width / 2;

            let closestItem = null;
            let minDistance = Infinity;

            sliderItems.forEach(item => {
                const itemRect = item.getBoundingClientRect();
                const itemCenter = itemRect.left + itemRect.width / 2;
                const distance = Math.abs(containerCenter - itemCenter);

                if (distance < minDistance) {
                    minDistance = distance;
                    closestItem = item;
                }
            });

            if (closestItem) {
                sliderItems.forEach(item => item.classList.remove('active'));
                closestItem.classList.add('active');

                const type = closestItem.getAttribute('data-type');
                document.querySelectorAll('#section-prices .display-img').forEach(img => img.classList.remove('active'));
                
                if (type === 'na') {
                    priceSelectedTitle.textContent = '';
                } else if (type === 'applewatch') {
                    priceSelectedTitle.textContent = 'Apple Watch';
                    document.getElementById('img-price-applewatch').classList.add('active');
                } else if (type === 'capacity') {
                    priceSelectedTitle.textContent = '硬碟擴容';
                    document.getElementById('img-price-memory').classList.add('active');
                } else if (type === 'switch') {
                    priceSelectedTitle.textContent = 'Switch遊戲機';
                    const target = document.getElementById('img-price-switch');
                    if(target) target.classList.add('active');
                } else if (type === 'vacuum') {
                    priceSelectedTitle.textContent = '吸塵器';
                    const target = document.getElementById('img-price-vacuum');
                    if(target) target.classList.add('active');
                } else if (type === 'hairdryer') {
                    priceSelectedTitle.textContent = '吹風機';
                    const target = document.getElementById('img-price-hairdryer');
                    if(target) target.classList.add('active');
                } else if (type === 'data') {
                    priceSelectedTitle.textContent = '資料救援';
                    const target = document.getElementById('img-price-data');
                    if(target) target.classList.add('active');
                }
            }
        }

        priceSlider.addEventListener('scroll', updateActiveSliderItem);

        sliderItems.forEach(item => {
            item.addEventListener('click', () => {
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        });
    </script>
</body>
</html>
