<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOR.IAN | 韓國代購連線</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f7b500; --bg: #f2f4f6; --white: #ffffff;
            --text-main: #191f28; --text-sub: #4e5968; --radius-lg: 24px; --radius-md: 16px;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }

        /* 右上角添加按鈕 */
        .add-btn { position: fixed; top: 20px; right: 20px; width: 48px; height: 48px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; z-index: 90; border: none; box-shadow: 0 4px 15px rgba(247, 181, 0, 0.3); }
        
        .page-content { display: none; padding: 20px 16px 120px 16px; min-height: 100vh; box-sizing: border-box; }
        .page-content.active { display: block; }

        /* 商品卡片：兩兩一行 */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--white); border-radius: var(--radius-md); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; }
        .product-img-box { width: 100%; padding-top: 100%; position: relative; background: #f0f0f0; }
        .product-img-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 12px; }
        .p-name { font-size: 14px; font-weight: 500; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
        .p-price { color: var(--primary); font-weight: 900; margin-top: 6px; font-size: 16px; }
        .p-price::before { content: "NT$ "; font-size: 11px; }

        /* 底部導覽列 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; padding: 12px 0 calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid #eee; z-index: 100; }
        .nav-item { color: #adb5bd; text-align: center; flex: 1; font-size: 11px; font-weight: 900; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { width: 22px; height: 22px; }

        /* 彈窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .toss-card { background: #fff; border-radius: var(--radius-lg); padding: 28px 24px; width: 100%; max-width: 340px; box-sizing: border-box; }
        input { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; margin-bottom: 16px; box-sizing: border-box; font-size: 16px; outline: none; background: #f9f9f9; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-app">
        <button id="add-btn" class="add-btn" onclick="document.getElementById('add-modal').style.display='flex'">＋</button>

        <section id="page-shop" class="page-content active">
            <div id="product-grid" class="product-grid"></div>
        </section>
        
        <section id="page-pop" class="page-content">
            <div style="text-align: center; padding-top: 100px; color: #999;">🪄 韓風 POP 準備中</div>
        </section>
        
        <section id="page-passport" class="page-content">
            <div class="toss-card" style="margin: 0 auto;">
                <h3 style="margin-top:0;">我的護照</h3>
                <div id="user-info">連線中...</div>
                <button class="btn-main" style="background:#eee; color:#999; margin-top:20px;" onclick="liff.logout(); location.reload();">登出</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-shop" onclick="switchPage('shop')">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span>弘大漫遊</span>
            </div>
            <div class="nav-item" id="nav-pop" onclick="switchPage('pop')">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                <span>韓風POP</span>
            </div>
            <div class="nav-item" id="nav-passport" onclick="switchPage('passport')">
                <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                <span>我的護照</span>
            </div>
        </nav>
    </div>

    <div id="add-modal" class="modal">
        <div class="toss-card">
            <h2 style="margin:0 0 20px 0;">新增商品</h2>
            <input type="text" id="p-name" placeholder="中文品名">
            <input type="number" id="p-price" placeholder="台幣價格 NT$">
            <input type="file" id="p-file" accept="image/*">
            <button class="btn-main" id="submit-btn" onclick="uploadProduct()">確認上傳</button>
            <button style="background:none; border:none; color:#999; margin-top:15px; width:100%;" onclick="document.getElementById('add-modal').style.display='none'">取消</button>
        </div>
    </div>

    <script>
        const LIFF_ID = '2009405888-D5absVA3'; 
        const SUPABASE_URL = 'https://ivpctyqlrkjstfsoweeh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cGN0eXFscmtqc3Rmc293ZWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTk1MTksImV4cCI6MjA4ODc3NTUxOX0.DYgzhaTH3_5NFwv009ZfZAshfUnCW2PeTuNcJ9feyMU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                document.getElementById('user-info').innerText = "連線帳號：" + profile.displayName;
                fetchProducts();
            } catch (e) { console.error(e); }
        }

        async function uploadProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-file').files[0];
            if(!name || !price || !file) return alert("請填寫完整");

            const btn = document.getElementById('submit-btn');
            btn.innerText = "正在處理圖片..."; btn.disabled = true;

            // 1. 上傳圖片到 Storage (product-images 桶子)
            const fileName = `item_${Date.now()}.jpg`;
            const { error: upErr } = await _supabase.storage.from('product-images').upload(fileName, file);
            if(upErr) { alert("圖片上傳失敗，請確認 Storage 是否有建立 'product-images' 並開啟公開權限"); btn.disabled = false; return; }

            // 2. 獲取該圖片的公開網址
            const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(fileName);

            // 3. 將資料寫入 products 資料表 (名稱與 SQL 表完全對應)
            const { error: dbErr } = await _supabase.from('products').insert({
                name_zh: name,
                price_nt: price,
                image_url: urlData.publicUrl,
                status: '待核准'
            });

            if(!dbErr) {
                alert("商品登錄成功！審核後就會出現囉✈️");
                location.reload();
            } else {
                alert("資料庫寫入失敗: " + dbErr.message);
                btn.disabled = false;
            }
        }

        async function fetchProducts() {
            // 讀取 status 為「可上架」的商品
            const { data } = await _supabase.from('products').select('*').eq('status', '可上架').order('created_at', { ascending: false });
            if(data && data.length > 0) {
                document.getElementById('product-grid').innerHTML = data.map(p => `
                    <div class="product-card">
                        <div class="product-img-box"><img src="${p.image_url}"></div>
                        <div class="product-info">
                            <div class="p-name">${p.name_zh}</div>
                            <div class="p-price">${Number(p.price_nt).toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('product-grid').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#999; padding-top:40px;">目前尚無公開商品</p>';
            }
        }

        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + p).classList.add('active');
            // 只有在弘大漫遊頁面顯示「＋」按鈕
            document.getElementById('add-btn').style.display = (p === 'shop') ? 'flex' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
