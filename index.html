<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOR.IAN | 韓國代購連線</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f7b500; --bg: #f2f4f6; --white: #ffffff;
            --text-main: #191f28; --text-sub: #4e5968; --error: #f44336;
            --radius-lg: 24px; --radius-md: 16px; --radius-pill: 50px;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg); 
            margin: 0; padding: 0; color: var(--text-main); 
            -webkit-font-smoothing: antialiased; overflow-x: hidden; 
        }

        /* 頂部隱藏標題列，內容上移 */
        #main-app { padding-top: 10px; }

        /* 右上角添加按鈕 */
        .add-btn { 
            position: fixed; top: 20px; right: 20px; 
            width: 48px; height: 48px; background: var(--primary); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; box-shadow: 0 4px 15px rgba(247, 181, 0, 0.4); 
            z-index: 90; cursor: pointer; border: none; 
        }

        /* 頁面切換內容 */
        .page-content { display: none; padding-bottom: 120px; min-height: 100vh; box-sizing: border-box; }
        .page-content.active { display: block; }

        /* 商品卡片：兩兩一行 */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
        .product-card { background: var(--white); border-radius: var(--radius-md); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .product-img-box { width: 100%; padding-top: 100%; position: relative; background: #eee; }
        .product-img-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 12px; }
        .p-name { font-size: 14px; font-weight: 500; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; margin-bottom: 4px; }
        .p-price { font-size: 16px; font-weight: 900; color: var(--primary); }
        .p-price::before { content: "NT$ "; font-size: 11px; }

        /* 底部導覽列 */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; justify-content: space-around; 
            padding: 12px 10px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #e5e8eb; z-index: 100; 
        }
        .nav-item { 
            flex: 1; text-align: center; border: none; background: none; 
            color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 4px; 
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 11px; font-weight: 900; }
        .nav-icon { width: 24px; height: 24px; }

        /* 彈窗樣式 */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(8px); z-index: 500; align-items: center; justify-content: center; padding: 20px; 
        }
        .toss-card { 
            background: var(--white); border-radius: var(--radius-lg); padding: 28px 24px; 
            width: 100%; max-width: 340px; box-sizing: border-box; 
        }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 14px 16px; border: 1.5px solid #e5e8eb; border-radius: var(--radius-md); 
            background: #f9fafb; font-size: 16px; box-sizing: border-box; outline: none; margin-bottom: 16px; 
        }
        .btn-primary { 
            background-color: var(--primary); color: white; border: none; border-radius: var(--radius-md); 
            padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; 
        }

        /* 載入中畫面 */
        #loading-screen { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 16px; font-weight: 700; color: var(--text-sub);">連線 IAN AIR 中...</p>
    </div>

    <button id="add-product-btn" class="add-btn" style="display:none;" onclick="openAddModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div id="onboarding-modal" class="modal-overlay">
        <div class="toss-card">
            <h2 style="margin: 0 0 4px 0; font-weight: 900;">報到櫃檯</h2>
            <p style="color:var(--text-sub); font-size:13px; margin-bottom:20px;">請完成報到程序以開啟旅程。</p>
            <label>* 真實姓名</label><input type="text" id="reg-name" placeholder="收件人全名">
            <label>* 聯絡電話</label><input type="tel" id="reg-phone" placeholder="09xxxxxxxx" maxlength="10">
            <label>* 電子信箱</label><input type="email" id="reg-email" placeholder="example@mail.com">
            <button class="btn-primary" onclick="saveProfile()">完成報到</button>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="toss-card">
            <h2 style="margin: 0 0 20px 0; font-weight: 900;">新增商品</h2>
            <label>* 商品名稱</label><input type="text" id="add-name" placeholder="輸入中文品名">
            <label>* 售價 (NT)</label><input type="number" id="add-price" placeholder="輸入台幣售價">
            <label>* 商品截圖</label><input type="file" id="add-file" accept="image/*">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" style="background:#eee; color:#666;" onclick="closeAddModal()">取消</button>
                <button id="submit-btn" class="btn-primary" onclick="submitProduct()">商品登錄</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <section id="page-shop" class="page-content active">
            <div id="product-grid" class="product-grid"></div>
        </section>

        <section id="page-pop" class="page-content">
            <div class="toss-card" style="text-align: center; padding: 80px 20px;">
                <div style="font-size: 40px; margin-bottom: 16px;">🪄</div>
                <p style="color: var(--text-sub); font-weight: 700;">韓風 POP 專區<br>活動準備中，敬請期待！</p>
            </div>
        </section>

        <section id="page-passport" class="page-content">
            <div class="toss-card">
                <h3 style="margin-top:0; font-weight: 900;">我的護照</h3>
                <div id="user-info-display" style="line-height: 2.2; font-weight: 500;"></div>
                <button class="btn-primary" style="background:#f2f4f6; color:#adb5bd; margin-top:32px; font-size: 14px;" onclick="liff.logout(); location.reload();">登出報到</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active" id="btn-shop" onclick="switchPage('shop')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span>弘大漫遊</span>
            </div>
            <div class="nav-item" id="btn-pop" onclick="switchPage('pop')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                <span>韓風POP</span>
            </div>
            <div class="nav-item" id="btn-passport" onclick="switchPage('passport')">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                <span>我的護照</span>
            </div>
        </nav>
    </div>

    <script>
        const LIFF_ID = '2009405888-D5absVA3'; 
        const SUPABASE_URL = 'https://ivpctyqlrkjstfsoweeh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cGN0eXFscmtqc3Rmc293ZWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTk1MTksImV4cCI6MjA4ODc3NTUxOX0.DYgzhaTH3_5NFwv009ZfZAshfUnCW2PeTuNcJ9feyMU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userLineId = null;

        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile(); userLineId = profile.userId;
                checkMemberStatus();
            } catch (err) { console.error(err); }
        }

        async function checkMemberStatus() {
            const { data, error } = await _supabase.from('profiles').select('*').eq('line_id', userLineId).maybeSingle();
            document.getElementById('loading-screen').style.display = 'none';
            if (data && data.is_onboarded) {
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('add-product-btn').style.display = 'flex';
                document.getElementById('user-info-display').innerHTML = `<p><b>登機姓名：</b>${data.full_name}</p><p><b>聯絡電話：</b>${data.phone}</p><p><b>電子信箱：</b>${data.email}</p>`;
                fetchProducts();
            } else {
                document.getElementById('onboarding-modal').style.display = 'flex';
            }
        }

        function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }

        async function submitProduct() {
            const name = document.getElementById('add-name').value;
            const price = document.getElementById('add-price').value;
            const file = document.getElementById('add-file').files[0];
            if(!name || !price || !file) return alert('請填寫完整資訊並選擇圖片');

            const btn = document.getElementById('submit-btn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            const fileName = `prod_${Date.now()}.jpg`;
            const { error: upErr } = await _supabase.storage.from('product-images').upload(fileName, file);
            if(upErr) { alert("上傳失敗，請確認 Storage 是否開啟 Policy"); btn.disabled = false; return; }

            const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(fileName);
            const { error: dbErr } = await _supabase.from('products').insert({
                name_zh: name, price_nt: price, image_url: urlData.publicUrl, status: '待核准'
            });

            if(!dbErr) { alert("登錄成功！審核後就會上架✈️"); location.reload(); }
        }

        async function fetchProducts() {
            const { data } = await _supabase.from('products').select('*').eq('status', '可上架').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('product-grid').innerHTML = data.map(p => `
                    <div class="product-card">
                        <div class="product-img-box"><img src="${p.image_url}" loading="lazy"></div>
                        <div class="product-info"><div class="p-name">${p.name_zh}</div><div class="p-price">${Number(p.price_nt).toLocaleString()}</div></div>
                    </div>
                `).join('');
            }
        }

        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + p).classList.add('active');
            document.getElementById('add-product-btn').style.display = (p === 'shop') ? 'flex' : 'none';
        }

        async function saveProfile() {
            const n = document.getElementById('reg-name').value;
            const p = document.getElementById('reg-phone').value;
            const e = document.getElementById('reg-email').value;
            if(!n || !p || !e) return alert('請填寫完整資訊');
            const { error } = await _supabase.from('profiles').upsert({ line_id: userLineId, full_name: n, phone: p, email: e, is_onboarded: true });
            if(!error) location.reload();
        }

        window.onload = initApp;
    </script>
</body>
</html>
